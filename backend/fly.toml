app = "careeros-backend"
primary_region = "bos"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[env]
  APP_ENV = "production"
  PORT = "8000"
  REDIS_ENABLED = "true"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
