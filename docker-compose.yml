version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: careeros_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-careeros}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-careeros_dev}
      POSTGRES_DB: ${POSTGRES_DB:-careeros}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careeros"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: careeros_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-careeros}:${POSTGRES_PASSWORD:-careeros_dev}@postgres:5432/${POSTGRES_DB:-careeros}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: careeros_frontend
    restart: unless-stopped
    working_dir: /app
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
  uploads_data:
