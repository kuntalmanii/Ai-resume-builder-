name: CI — CareerOS AI

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Backend Lint + Type Check
  # ──────────────────────────────────────────────────────────────────────────
  backend-lint:
    name: "Backend — Lint & Type Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check app tests

      - name: Type check with mypy
        run: mypy app --ignore-missing-imports --no-strict-optional
        continue-on-error: true  # non-blocking for now; track as tech debt

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Backend Tests (SQLite fast suite)
  # ──────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: "Backend — Tests"
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps
        continue-on-error: true

      - name: Create test environment
        run: |
          cat <<EOF > .env.test
          APP_ENV=testing
          DATABASE_URL=sqlite+aiosqlite:///./test_ci.db
          SECRET_KEY=ci-test-secret-key-that-is-long-enough-for-testing
          REDIS_URL=redis://localhost:6379/0
          REDIS_ENABLED=false
          AI_API_KEY=fake-api-key-for-tests
          STORAGE_PROVIDER=local
          RATE_LIMIT_ENABLED=false
          EOF

      - name: Run test suite
        run: pytest --tb=short -q
        env:
          ENV_FILE: .env.test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/.pytest_cache/

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Frontend Lint + TypeScript
  # ──────────────────────────────────────────────────────────────────────────
  frontend-lint:
    name: "Frontend — Lint & TypeScript"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint
        continue-on-error: true  # report but don't fail on style warnings

  # ──────────────────────────────────────────────────────────────────────────
  # Job 4: Frontend Build
  # ──────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: "Frontend — Production Build"
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Job 5: Docker Build Validation (backend)
  # ──────────────────────────────────────────────────────────────────────────
  docker-backend:
    name: "Docker — Backend Build"
    runs-on: ubuntu-latest
    needs: [backend-tests]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (validate only)
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile.prod
          push: false
          tags: careeros-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # Job 6: Docker Build Validation (frontend)
  # ──────────────────────────────────────────────────────────────────────────
  docker-frontend:
    name: "Docker — Frontend Build"
    runs-on: ubuntu-latest
    needs: [frontend-build]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image (validate only)
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile.prod
          push: false
          tags: careeros-frontend:ci-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max
